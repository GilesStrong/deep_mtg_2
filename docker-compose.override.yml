version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
    - ./frontend/.env
    volumes:
      - ./frontend:/app
      # keep dependencies in a named volume so bind-mount doesn't overwrite them
      - bun_cache:/root/.bun
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
      - playwright_browsers:/ms-playwright
    networks:
      - deepmtg_network
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    container_name: caddy_proxy
    ports:
      - "3000:3000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    env_file:
    - ./frontend/.env
    environment:
      - BACKEND_UPSTREAM=web:8000
      - FRONTEND_UPSTREAM=frontend:3001
      - PUBLIC_URL=${PUBLIC_URL}
    networks:
      - deepmtg_network
    depends_on:
      - frontend
      - web
    restart: unless-stopped

volumes:
  bun_cache:
  frontend_node_modules:
  frontend_next_cache:
  playwright_browsers:
