name: CI

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".github/workflows/backend_ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "app/**"

jobs:
  linting:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache uv resolver + project venv
      - name: Cache uv + venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ./.venv
          key: uv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version || '3.12' }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version || '3.12' }}-

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv --version

      # Install deps (dev group included by default); --frozen enforces uv.lock
      - name: Sync dependencies
        run: uv sync --frozen

      # Ruff: formatting check (no changes) and lint (GitHub format for inline annotations)
      - name: Ruff format (check)
        run: uv run ruff format --check app

      - name: Ruff lint
        run: uv run ruff check --output-format=github app

      # MyPy (uses your [tool.mypy] config in pyproject)
      - name: MyPy
        run: uv run mypy .

  backend-tests:
    runs-on: ubuntu-24.04
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: tests_deepmtg
          POSTGRES_USER: tests_deepmtg_user
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tests_deepmtg_user -d tests_deepmtg"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv + venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ./.venv
          key: uv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version || '3.12' }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version || '3.12' }}-

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv --version

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        env:
          APP_ENV_FILE: ${{ github.workspace }}/.env.tests
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
        run: cd app && uv run python manage.py test --failfast

  backend-security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv --version

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-backend.sarif
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif

      - name: Generate backend SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: backend-sbom.spdx.json

      - name: Install cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign backend SBOM (keyless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cosign sign-blob --yes \
            --output-signature backend-sbom.sig \
            --output-certificate backend-sbom.pem \
            backend-sbom.spdx.json

      - name: Upload backend SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: |
            backend-sbom.spdx.json
            backend-sbom.sig
            backend-sbom.pem
