name: CI

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

on:
  push:
    branches: [main]

jobs:
  frontend-security:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Generate text lockfile for Trivy (bun.lock)
        working-directory: frontend
        run: |
          bun install --save-text-lockfile
          ls -la

      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: fs
          scan-ref: frontend
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-frontend.sarif
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif

      - name: Generate frontend SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: frontend
          format: spdx-json
          output-file: frontend-sbom.spdx.json

      - name: Install cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign frontend SBOM (keyless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cosign sign-blob --yes \
            --output-signature frontend-sbom.sig \
            --output-certificate frontend-sbom.pem \
            frontend-sbom.spdx.json

      - name: Upload frontend SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: |
            frontend-sbom.spdx.json
            frontend-sbom.sig
            frontend-sbom.pem
